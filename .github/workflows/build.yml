name: Build Android APK with Buildozer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Manuel olarak da tetikleyebilmeniz için

jobs:
  build:
    runs-on: ubuntu-24.04 # En güncel ve kararlı Ubuntu imajı

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.11' # Buildozer ve Kivy için en kararlı sürüm

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good

    - name: Install Android SDK Dependencies
      run: |
        sudo apt-get install -y \
          cmake \
          openjdk-17-jdk \
          unzip \
          zip \
          libncurses5 \
          libstdc++6 \
          libgtk-3-0

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install Cython==3.0.11 buildozer virtualenv

    - name: Build Android APK
      env:
        # Buildozer'ın arka planda takılmasını önlemek için etkileşimsiz mod çevresel değişkeni
        CI: true
      run: |
        # Android SDK lisanslarını otomatik olarak kabul etmek için 'yes' komutu ile borulama (pipe) yapıyoruz
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
